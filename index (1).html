<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD Clearance Hunter</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #F96302;
    --penny: #f5c518;
    --green: #1D9E75;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header { padding: 32px 24px 0; }
  .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .hd { background: var(--orange); color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 18px; padding: 3px 10px; border-radius: 4px; letter-spacing: 1px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 12vw, 88px); letter-spacing: 2px; line-height: 0.88; }
  h1 em { font-style: normal; color: var(--orange); }
  .sub { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-top: 10px; letter-spacing: 0.5px; }

  .search { padding: 28px 24px 16px; }
  .search-row { display: flex; gap: 10px; max-width: 520px; }
  input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 22px; padding: 13px 18px; border-radius: 8px; letter-spacing: 5px; outline: none; transition: border-color .2s; }
  input:focus { border-color: var(--orange); }
  input::placeholder { color: var(--muted); letter-spacing: 4px; }
  button.hunt { background: var(--orange); color: #fff; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1.5px; padding: 0 26px; border-radius: 8px; cursor: pointer; transition: background .15s; flex-shrink: 0; height: 56px; }
  button.hunt:hover { background: #d95500; }
  button.hunt:disabled { background: #333; cursor: not-allowed; }

  .filters { padding: 0 24px 20px; display: none; gap: 8px; flex-wrap: wrap; }
  .fb { font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all .15s; }
  .fb.active { background: var(--orange); border-color: var(--orange); color: #fff; }
  .fb:hover:not(.active) { border-color: var(--orange); color: var(--text); }

  .stats { padding: 0 24px 18px; display: none; gap: 10px; flex-wrap: wrap; }
  .stat { background: var(--surface); border-radius: 8px; padding: 10px 16px; }
  .stat-v { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; line-height: 1; }
  .stat-l { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }

  .content { padding: 0 24px 60px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; transition: border-color .15s, transform .2s; animation: up .3s ease both; }
  .card:hover { border-color: #3a3a3a; transform: translateY(-2px); }
  .card.penny { border-color: var(--penny); box-shadow: 0 0 18px rgba(245,197,24,.1); }
  @keyframes up { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .badge { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 7px; border-radius: 3px; text-transform: uppercase; letter-spacing: .4px; }
  .b-penny { background: rgba(245,197,24,.12); color: #c9a000; border: 1px solid rgba(245,197,24,.3); }
  .b-clear { background: rgba(249,99,2,.1); color: var(--orange); border: 1px solid rgba(249,99,2,.25); }
  .b-off { background: rgba(29,158,117,.1); color: #0F6E56; border: 1px solid rgba(29,158,117,.25); }
  .b-cat { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  .card-name { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .pricing { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .price { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; color: var(--orange); }
  .price.penny { color: var(--penny); font-size: 30px; }
  .was { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); text-decoration: line-through; }
  .saved { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--green); }

  .card-foot { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid var(--border); margin-top: 2px; }
  .sku { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .view { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-decoration: none; border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; transition: all .15s; }
  .view:hover { border-color: var(--orange); color: var(--orange); }

  .state { text-align: center; padding: 50px 20px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 13px; line-height: 1.7; }
  .state h2 { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; color: var(--text); margin-bottom: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
  .note { background: rgba(249,99,2,.06); border: 1px solid rgba(249,99,2,.2); border-radius: 8px; padding: 10px 14px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); line-height: 1.7; margin-bottom: 14px; }
  .note strong { color: var(--orange); }
  .err { background: rgba(255,80,80,.08); border: 1px solid rgba(255,80,80,.25); color: #ff8080; border-radius: 8px; padding: 10px 14px; font-family: 'DM Mono', monospace; font-size: 12px; margin: 0 24px 14px; display: none; }

  @media(max-width:500px) {
    header, .search, .filters, .stats, .content { padding-left: 16px; padding-right: 16px; }
    .grid { grid-template-columns: 1fr; }
    h1 { font-size: 52px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <span class="hd">HD</span>
    <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px">CLEARANCE HUNTER</span>
  </div>
  <h1>HUNT<br><em>DEALS</em></h1>
  <p class="sub">// penny items · hidden clearance · real-time savings</p>
</header>

<div class="search">
  <div class="search-row">
    <input id="zip" type="text" inputmode="numeric" maxlength="5" placeholder="ZIP code" />
    <button class="hunt" id="btn" onclick="hunt()">HUNT</button>
  </div>
</div>

<div class="err" id="err"></div>

<div class="filters" id="filters">
  <button class="fb active" onclick="filt('all',this)">All deals</button>
  <button class="fb" onclick="filt('penny',this)">🪙 Penny only</button>
  <button class="fb" onclick="filt('50',this)">50%+ off</button>
  <button class="fb" onclick="filt('70',this)">70%+ off</button>
</div>

<div class="stats" id="stats"></div>

<div class="content">
  <div id="out" class="state">
    <h2>ENTER YOUR ZIP</h2>
    Find penny deals & hidden clearance<br>at Home Depot stores near you
  </div>
</div>

<script>
  // ⚠️ REPLACE THIS URL with your Vercel API URL after deploying
  const API_URL = 'https://hd-clearance-hunter.vercel.app/api/deals';

  let all = [];

  document.getElementById('zip').addEventListener('keydown', e => { if (e.key === 'Enter') hunt(); });

  async function hunt() {
    const zip = document.getElementById('zip').value.trim();
    if (zip.length !== 5 || isNaN(zip)) { showErr('Enter a valid 5-digit ZIP code.'); return; }

    const btn = document.getElementById('btn');
    btn.disabled = true; btn.textContent = '...';
    document.getElementById('err').style.display = 'none';
    document.getElementById('filters').style.display = 'none';
    document.getElementById('stats').style.display = 'none';
    setOut(`<div class="spinner"></div><h2>SCANNING</h2>Hunting clearance near ${zip}...`);

    try {
      const resp = await fetch(`${API_URL}?zip=${zip}`);
      if (!resp.ok) throw new Error(`API error ${resp.status}`);
      const data = await resp.json();

      all = (data.items || []).sort((a, b) => {
        if (a.isPenny && !b.isPenny) return -1;
        if (!a.isPenny && b.isPenny) return 1;
        return b.percentOff - a.percentOff;
      });

      if (all.length === 0) {
        setOut(`<h2>NO DEALS FOUND</h2>No clearance near this ZIP right now.<br>Try a nearby ZIP code.`);
      } else {
        renderStats(all);
        renderCards(all);
        document.getElementById('filters').style.display = 'flex';
      }
    } catch (e) {
      showErr('Could not load deals. Make sure the API is deployed on Vercel.');
      setOut(`<h2>ERROR</h2>${e.message}`);
    }

    btn.disabled = false; btn.textContent = 'HUNT';
  }

  function filt(type, btn) {
    document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = type === 'penny' ? all.filter(i => i.isPenny)
      : type === '50' ? all.filter(i => i.percentOff >= 50)
      : type === '70' ? all.filter(i => i.percentOff >= 70) : all;
    renderCards(f);
  }

  function renderStats(items) {
    const el = document.getElementById('stats');
    el.style.display = 'flex';
    const pennies = items.filter(i => i.isPenny).length;
    const savings = items.reduce((s, i) => s + Math.max(0, i.originalPrice - i.price), 0);
    const avg = Math.round(items.reduce((s, i) => s + i.percentOff, 0) / items.length);
    el.innerHTML = [
      [items.length, 'Deals', '#f0f0f0'],
      [pennies, 'Penny', '#c9a000'],
      [avg + '%', 'Avg off', '#F96302'],
      ['$' + Math.round(savings), 'Savings', '#0F6E56']
    ].map(([v, l, c]) => `<div class="stat"><div class="stat-v" style="color:${c}">${v}</div><div class="stat-l">${l}</div></div>`).join('');
  }

  function renderCards(items) {
    if (!items.length) { setOut(`<h2>NO MATCHES</h2>Try a different filter.`); return; }
    const note = `<div class="note"><strong>TIP:</strong> Penny items must be verified in-store — scan the <strong>item barcode</strong> (not the yellow tag) at self-checkout. Stock varies by location.</div>`;
    const cards = items.map((item, i) => {
      const saved = item.originalPrice > item.price ? `$${(item.originalPrice - item.price).toFixed(2)} saved` : '';
      return `<div class="card ${item.isPenny ? 'penny' : ''}" style="animation-delay:${Math.min(i * 35, 500)}ms">
        <div class="badges">
          ${item.isPenny ? '<span class="badge b-penny">🪙 Penny</span>' : '<span class="badge b-clear">Clearance</span>'}
          ${item.percentOff >= 1 ? `<span class="badge b-off">${Math.round(item.percentOff)}% off</span>` : ''}
          <span class="badge b-cat">${esc(item.category || '')}</span>
        </div>
        <div class="card-name">${esc((item.brand ? item.brand + ' ' : '') + item.name)}</div>
        <div class="pricing">
          <span class="price ${item.isPenny ? 'penny' : ''}">$${item.price.toFixed(2)}</span>
          ${item.originalPrice > item.price ? `<span class="was">$${item.originalPrice.toFixed(2)}</span>` : ''}
          ${saved ? `<span class="saved">${saved}</span>` : ''}
        </div>
        <div class="card-foot">
          <span class="sku">SKU: ${esc(String(item.sku))}</span>
          <a class="view" href="${esc(item.url)}" target="_blank">View →</a>
        </div>
      </div>`;
    }).join('');
    document.getElementById('out').innerHTML = '';
    document.getElementById('out').className = '';
    document.getElementById('out').style.cssText = '';
    document.getElementById('out').innerHTML = note + `<div class="grid">${cards}</div>`;
  }

  function setOut(h) {
    const el = document.getElementById('out');
    el.className = 'state';
    el.innerHTML = h;
  }
  function showErr(m) { const el = document.getElementById('err'); el.style.display = 'block'; el.textContent = '⚠ ' + m; }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
